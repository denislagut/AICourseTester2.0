<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/TeacherDashboard/TeacherDashboard.css">
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/styles/headers/AdminHeader.css">
    <title>Рекомендации и аналитика</title>
</head>
<body>
    <header class="header-wrapper">
        <div class="profile-logo">
            <img class="profile-logo__sys-img" src="/img/University_logo.webp" alt="">
            <span class="profile-logo__sys-name">Система проверки заданий по СИИ</span>
        </div>
        <div class="profile-tooltip">
            <img class="profile-tooltip__img-bell" src="/img/bell.svg" alt="">
            <img class="profile-tooltip__img-user" src="/img/default-profile.webp" alt="">
            <div class="profile-tooltip__menu">
                <div>
                    <a class="profile-tooltip_to-profile-href" href="/ProfileTeacherPage/ProfileTeacherPage.html"> </a>
                    <span class="profile-tooltip_username">Иванов И. И.</span><br>
                    <span class="profile-tooltip_role">Преподаватель</span>
                </div>
                <div class="profile-tooltip__dropdown">
                    <button class="profile-tooltip__button-chevron"></button>
                    <div class="profile-tooltip__dropdown-content">
                        <a class="profile-tooltip__dropdown-button button_analytics" href="/TeacherDashboard/TeacherDashboard.html" title="Рекомендации и аналитика" aria-label="Рекомендации и аналитика"></a>
                        <a class="profile-tooltip__dropdown-button button_settings" href="/AdminPage/AdminPage.html" title="Пользователи" aria-label="Пользователи"></a>
                        <button id="profile-tooltip__button-logout" class="profile-tooltip__dropdown-button button_logout" title="Выйти" aria-label="Выйти"></button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="main-wrapper">
        <section class="dashboard-section">
            <div class="section-heading">
                <h1>Общая аналитика</h1>
                <span id="summary-status" class="status-text"></span>
            </div>
            <div id="summary-grid" class="summary-grid"></div>
        </section>

        <section class="dashboard-section">
            <div class="section-heading">
                <h2>Аналитика студента</h2>
                <form id="student-form" class="lookup-form">
                    <input id="student-user-id" type="text" placeholder="Идентификатор пользователя" autocomplete="off">
                    <button type="submit">Загрузить</button>
                </form>
            </div>
            <div id="student-status" class="status-text"></div>
            <div id="student-content" class="analytics-layout"></div>
        </section>

        <section class="dashboard-section">
            <div class="section-heading">
                <h2>Аналитика группы</h2>
                <form id="group-form" class="lookup-form">
                    <input id="group-id" type="number" min="1" placeholder="Идентификатор группы" autocomplete="off">
                    <button type="submit">Загрузить</button>
                </form>
            </div>
            <div id="group-status" class="status-text"></div>
            <div id="group-content" class="analytics-layout"></div>
        </section>
        <section class="dashboard-section">
            <div class="section-heading">
                <h2>Отчёты</h2>
            </div>
            <div class="reports-grid">
                <form id="student-report-form" class="panel report-form">
                    <h3>Отчёт по студенту</h3>
                    <input id="report-student-user-id" type="text" placeholder="Идентификатор пользователя" autocomplete="off">
                    <div class="report-actions">
                        <button type="submit">Сформировать отчёт по студенту</button>
                        <button id="student-report-history-button" type="button" class="button-secondary">Показать историю отчётов студента</button>
                    </div>
                </form>

                <form id="group-report-form" class="panel report-form">
                    <h3>Отчёт по группе</h3>
                    <input id="report-group-id" type="number" min="1" placeholder="Идентификатор группы" autocomplete="off">
                    <div class="report-actions">
                        <button type="submit">Сформировать отчёт по группе</button>
                        <button id="group-report-history-button" type="button" class="button-secondary">Показать историю отчётов группы</button>
                    </div>
                </form>
            </div>
            <div id="reports-status" class="status-text"></div>
            <div id="reports-content" class="reports-content"></div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/js-cookie@3.0.1/dist/js.cookie.min.js"></script>
    <script src="/scripts/main.js"></script>
    <script src="/scripts/auth.js"></script>
    <script src="/TeacherDashboard/TeacherDashboard.js"></script>
</body>
</html>
